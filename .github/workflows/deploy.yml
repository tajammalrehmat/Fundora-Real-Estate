name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build App
        env:
          VITE_RESEND_API_KEY: ${{ secrets.VITE_RESEND_API_KEY || secrets.RESEND_API_KEY || vars.VITE_RESEND_API_KEY || vars.RESEND_API_KEY }}
          VITE_EMAIL_SERVICE_ACTIVE: "true"
          VITE_RESEND_FROM_EMAIL: ${{ secrets.VITE_RESEND_FROM_EMAIL || secrets.RESEND_FROM_EMAIL || vars.VITE_RESEND_FROM_EMAIL || vars.RESEND_FROM_EMAIL || 'no-reply@fundora.one' }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID || secrets.EMAILJS_SERVICE_ID || vars.VITE_EMAILJS_SERVICE_ID || vars.EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID || secrets.EMAILJS_TEMPLATE_ID || vars.VITE_EMAILJS_TEMPLATE_ID || vars.EMAILJS_TEMPLATE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY || secrets.EMAILJS_PUBLIC_KEY || vars.VITE_EMAILJS_PUBLIC_KEY || vars.EMAILJS_PUBLIC_KEY }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist
          branch: gh-pages
